<!DOCTYPE html>
<html>
<head>
    <title>Pendaftaran Kursus</title>
</head>
<body>
    <form>
        <table border="2" cellspacing="0" cellpadding="10" width="700">
            <tr>
                <td bgcolor="#87CEEB" align="center">
                    <font color="red" size="6" face="Arial"><b>Pendaftaran Kursus</b></font>
                </td>
            </tr>
            <tr>
                <td bgcolor="#808080">
                    <font size="5" face="Arial"><b>Data Diri</b></font><br><br>
                    <table border="0" cellspacing="0" cellpadding="4">
                        <tr>
                            <td width="200">Nama</td>
                            <td><input type="text" name="nama" size="30"></td>
                        </tr>
                        <tr>
                            <td>Nim</td>
                            <td><input type="text" name="nim" size="30"></td>
                        </tr>
                        <tr>
                            <td>E-mail</td>
                            <td><input type="text" name="email" size="30"></td>
                        </tr>
                        <tr>
                            <td>Tanggal Lahir</td>
                            <td><input type="text" name="tgl_lahir" value="hh/bb/tttt" size="30"></td>
                        </tr>
                        <tr>
                            <td valign="top">Jenis Kelamin</td>
                            <td>
                                <input type="radio" name="jk" value="Laki-laki"> Laki-laki<br>
                                <input type="radio" name="jk" value="Perempuan"> Perempuan
                            </td>
                        </tr>
                        <tr>
                            <td valign="top">Pilih Program Kursus</td>
                            <td>
                                <input type="checkbox" name="kursus" value="C#"> C#<br>
                                <input type="checkbox" name="kursus" value="Java"> Java<br>
                                <input type="checkbox" name="kursus" value="SQL"> SQL<br>
                                <input type="checkbox" name="kursus" value="HTML_PHP"> HTML dan PHP
                            </td>
                        </tr>
                        <tr>
                            <td>Pilihan Hari/Jam Kursus</td>
                            <td>
                                <select name="waktu" multiple>
                                    <option>Senin - Rabu/09.00 - 11.00</option>
                                    <option>Kamis - Jumat/13.00 - 15.00</option>
                                    <option>Sabtu - Minggu/08.00 - 10.00</option>
                                </select>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
            <tr>
                <td bgcolor="#FA8072">
                    Komentar Anda<br>
                    <textarea name="komentar" cols="75" rows="5"></textarea><br><br>
                    <input type="reset" value="Reset">
                    <input type="submit" value="Submit">
                    <input type="button" value="Cancel">
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
